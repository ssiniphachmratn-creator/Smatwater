<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Water Dispenser</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="app-container">
    <div id="step1" class="step-page active">
        <div class="hero">
            <h1>💧 Smart Water</h1>
            <p>สดชื่น สะอาด ปลอดภัย</p>
        </div>
        <button id="btn-register" class="btn-ghost">👤 สมัครสมาชิก / รับส่วนลด</button>
        
        <h3>เลือกปริมาณน้ำ</h3>
        <div class="water-card" onclick="selectAmount(5)"><span>600 mL</span> <strong>5 ฿</strong></div>
        <div class="water-card" onclick="selectAmount(10)"><span>1 L</span> <strong>10 ฿</strong></div>
    </div>

    <div id="step2" class="step-page">
        <h2>💳 ชำระเงิน</h2>
        <div class="display-price" id="selected-price">0 ฿</div>
        <p>กรุณาสแกน QR Code ที่หน้าตู้</p>
        <button onclick="simulatePayment()" class="btn-fill">✅ [เดโม] จ่ายเงินแล้ว</button>
    </div>

    <div id="step3" class="step-page">
        <h2 id="status-text">💧 กำลังจ่ายน้ำ...</h2>
        <div class="timer-circle" id="countdown-timer">60</div>
        <button id="btn-main-action" onclick="toggleDispenser()" class="btn-warn">🛑 หยุดจ่ายน้ำชั่วคราว</button>
    </div>

    <div id="step4" class="step-page">
        <div class="success-icon">✨</div>
        <h2>จ่ายน้ำเสร็จสิ้น</h2>
        <button onclick="changePage('step4', 'step1')" class="btn-fill">กลับหน้าหลัก</button>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
