<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Water</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="phone">

<!-- ================= HOME ================= -->

<section id="home" class="screen active">

<header>

<h1>💧 Smart Water</h1>

<p>ตู้น้ำอัจฉริยะ</p>

</header>

<div class="card">

<h3>

<i class="fa-solid fa-user"></i>

สมัครสมาชิก

</h3>

<input
type="text"
id="memberName"
placeholder="ชื่อสมาชิก">

<button class="blue"
onclick="registerMember()">

สมัครสมาชิก

</button>

<div class="discount">

ซื้อครบ

<span id="buyCount">

0

</span>

/

3 ครั้ง

<br>

รับส่วนลด 2 บาท

</div>

</div>

<div class="card">

<h3>

เลือกขนาดน้ำ

</h3>

<div class="products">

<div class="product"
onclick="selectWater('600 ml',5)">

<i class="fa-solid fa-bottle-water"></i>

<h4>

600 ml

</h4>

<p>

5 บาท

</p>

</div>

<div class="product"
onclick="selectWater('1 L',10)">

<i class="fa-solid fa-bottle-water"></i>

<h4>

1 L

</h4>

<p>

10 บาท

</p>

</div>

</div>

</div>

</section>

<!-- ================= PAYMENT ================= -->

<section id="payment" class="screen">

<header>

<h2>

ชำระเงิน

</h2>

</header>

<div class="card center">

<h3 id="priceText">

ยอดชำระ

</h3>

<img src="assets/qr.png" class="qr">

<p>

กรุณาเข้าแอปธนาคารเพื่อชำระเงิน

</p>

<div id="paymentStatus">

⌛ รอการชำระเงิน...

</div>

<button
id="bankBtn"
class="green">

<i class="fa-solid fa-building-columns"></i>

เปิด Mobile Banking

</button>

<!-- ใช้ทดสอบก่อนเชื่อม ESP32 -->

<button
class="blue"
onclick="paymentSuccess()">

จำลองการชำระเงิน

</button>

</div>

</section>

<!-- ================= DISPENSE ================= -->

<section id="dispense" class="screen">

<header>

<h2>

กำลังจ่ายน้ำ

</h2>

</header>

<div class="timerCircle">

<span id="timer">

60

</span>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<button
class="green"
onclick="startDispense()">

▶️ จ่ายน้ำ

</button>

<button
class="red"
onclick="stopDispense()">

⏹️ หยุดจ่ายน้ำ

</button>

<p>

เมื่อกดหยุด

ระบบจะนับถอยหลัง 1 นาที

แล้วกลับหน้าหลักอัตโนมัติ

</p>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
