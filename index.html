<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Water</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="app-container">
    <div id="step1" class="step-page active">
        <div class="hero-card">
            <h1>💧 Smart Water</h1>
            <p>สดชื่น สะอาด ปลอดภัย</p>
            <button id="btn-goto-register" class="btn-primary">👤 สมัครสมาชิก / เช็คส่วนลด</button>
        </div>
        
        <div class="menu-section">
            <h3>เลือกปริมาณน้ำ</h3>
            <div class="water-card" onclick="selectAmount(5, 600)">
                <span>600 mL</span> <strong>5 ฿</strong>
            </div>
            <div class="water-card" onclick="selectAmount(10, 1000)">
                <span>1 L</span> <strong>10 ฿</strong>
            </div>
        </div>
    </div>

    <div id="step2" class="step-page">
        <div class="payment-box">
            <h2>💳 ชำระเงิน</h2>
            <div class="price-big" id="selected-price">0 ฿</div>
            <p>กรุณาสแกน QR Code ที่หน้าตู้</p>
            <button onclick="simulatePayment()" class="btn-success">✅ [เดโม] จ่ายเงินแล้ว</button>
            <button onclick="changePage('step2', 'step1')" class="btn-text">ย้อนกลับ</button>
        </div>
    </div>

    <div id="step3" class="step-page">
        <div class="dispense-box">
            <h2 id="status-text">💧 กำลังจ่ายน้ำ...</h2>
            <div class="timer-circle" id="countdown-timer">60</div>
            <button id="btn-main-action" onclick="toggleDispenser()" class="btn-warning">🛑 หยุดจ่ายน้ำชั่วคราว</button>
        </div>
    </div>

    <div id="step4" class="step-page">
        <div class="success-box">
            <h1>✨</h1>
            <h2>จ่ายน้ำเสร็จสิ้น</h2>
            <p>ขอบคุณที่ใช้บริการ</p>
            <button onclick="changePage('step4', 'step1')" class="btn-primary">กลับหน้าหลัก</button>
        </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
