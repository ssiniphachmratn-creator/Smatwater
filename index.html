<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Smart Water</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <div id="step1" class="step-page active">
            </div>

        <div id="step2" class="step-page">
            <h2>💳 ชำระเงิน</h2>
            <div id="selected-price">0 ฿</div>
            <button onclick="simulatePayment()">[เดโม] ชำระเงินสำเร็จ</button>
        </div>

        <div id="step3" class="step-page">
            <h2 id="status-text">💧 กำลังจ่ายน้ำ...</h2>
            <div id="countdown-timer">60</div>
            <button id="btn-main-action" onclick="toggleDispenser()">🛑 หยุดจ่ายน้ำชั่วคราว</button>
        </div>

        <div id="step4" class="step-page">
            <h2>✨ จ่ายน้ำเสร็จสิ้น</h2>
            <button onclick="changePage('step4', 'step1')">กลับหน้าหลัก</button>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
