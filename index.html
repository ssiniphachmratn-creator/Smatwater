<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Water</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

<!-- ================= HOME ================= -->

<section id="home" class="screen active">

<header>

<h2>💧 Smart Water</h2>

<p>ตู้น้ำอัจฉริยะ</p>

</header>

<div class="card member">

<h3><i class="fa-solid fa-user"></i> สมาชิก</h3>

<input
type="text"
id="memberName"
placeholder="ชื่อสมาชิก">

<button class="blue" onclick="registerMember()">

สมัครสมาชิก

</button>

<div class="discount">

ซื้อครบ

<span id="buyCount">

0

</span>

/

4 ครั้ง

<br>

รับส่วนลด 2 บาท

</div>

</div>

<div class="card">

<h3>เลือกน้ำ</h3>

<div class="products">

<div class="product"
onclick="selectWater('600ml',5)">

  

<h4>600 ml</h4>

<p>5 บาท</p>

</div>

<div class="product"
onclick="selectWater('1L',10)">



<h4>1 L</h4>

<p>10 บาท</p>

</div>

</div>

</div>

</section>

<!-- ================= PAYMENT ================= -->

<section id="payment" class="screen">

<header>

<h2>ชำระเงิน</h2>

</header>

<div class="card center">

<img
src="assets/qr.png"
class="qr">

<h3 id="priceText">

ยอดชำระ

</h3>

<button class="green">

<i class="fa-solid fa-building-columns"></i>

เปิด Mobile Banking

</button>

<button
class="blue"
onclick="paymentSuccess()">

ชำระเงินเรียบร้อย

</button>

</div>

</section>

<!-- ================= DISPENSE ================= -->

<section id="dispense" class="screen">

<header>

<h2>กำลังจ่ายน้ำ</h2>

</header>

<div class="timerCircle">

<span id="timer">

60

</span>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<button
class="green"
onclick="startDispense()">

เริ่มจ่ายน้ำ

</button>

<button
class="red"
onclick="stopDispense()">

หยุดจ่ายน้ำ

</button>

<p>

ครบ 1 นาที

ระบบจะหยุดอัตโนมัติ

</p>

</section>

<!-- ================= SUCCESS ================= -->

<section id="success" class="screen">

<div class="success">

<i class="fa-solid fa-circle-check"></i>

<h2>

จ่ายน้ำเสร็จสิ้น

</h2>

<p>

ขอบคุณที่ใช้บริการ

</p>

<button
class="blue"
onclick="goHome()">

กลับหน้าหลัก

</button>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
